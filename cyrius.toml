[package]
name = "itihas"
version = "2.0.0"
description = "Itihas — structured world history: civilizations, eras, events, figures, campaigns, sites, trade routes, calendars"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "4.0.0"

[build]
entry = "src/main.cyr"
output = "itihas"

[deps]
stdlib = ["string", "fmt", "alloc", "vec", "str", "syscalls", "io", "args", "assert", "hashmap", "tagged", "json", "toml", "fnptr", "bench"]
